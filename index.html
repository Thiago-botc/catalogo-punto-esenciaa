                { name: "Salvo elixir", price: 62000, img: "https://acdn-us.mitiendanube.com/stores/002/348/405/products/photoroom-20250830_160400-acc9b75cd6bc3a8ed217567522702213-1024-1024.webp" },

        let cart = [];

        window.contactWhatsApp = (productName) => {
            const message = `Hola! Me interesa el perfume ${productName} de Punto Esencia.`;
            const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        };

        window.addToCart = (name, price, img) => {
            const exists = cart.find(i => i.name === name);
            if(exists) exists.quantity++;
            else cart.push({ name, price, img, quantity: 1 });
            updateCartUI();
            const counter = document.getElementById('cart-counter');
            counter.classList.add('opacity-100');
        };

        window.toggleCart = () => {
            document.getElementById('cart-drawer').classList.toggle('open');
            document.getElementById('cart-overlay').classList.toggle('hidden');
        };

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const counter = document.getElementById('cart-counter');

            const totalQty = cart.reduce((sum, i) => sum + i.quantity, 0);
            const totalPrice = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);

            counter.innerText = totalQty;
            counter.style.opacity = totalQty > 0 ? '1' : '0';
            totalEl.innerText = formatPrice(totalPrice);

            if(cart.length === 0) {
                container.innerHTML = `<p class="text-center text-white/20 uppercase text-[9px] tracking-[0.3em] mt-20 italic">Tu selección está vacía</p>`;
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="flex gap-4 pb-4 border-b border-white/10 group">
                    <img src="${item.img}" class="w-16 h-20 object-cover bg-[#0a0a0a]">
                    <div class="flex-grow">
                        <div class="flex justify-between items-start mb-1">
                            <h4 class="text-[10px] font-bold text-white uppercase tracking-wider">${item.name}</h4>
                            <button onclick="removeFromCart('${item.name}')"><i class="ph ph-trash text-white/20 hover:text-red-500 transition-colors"></i></button>
                        </div>
                        <p class="text-gold text-[10px] font-bold tracking-widest">${formatPrice(item.price)}</p>
                        <div class="flex items-center gap-4 mt-3">
                            <button onclick="changeQty('${item.name}', -1)" class="w-6 h-6 border border-white/10 flex items-center justify-center text-xs hover:border-gold hover:text-gold">-</button>
                            <span class="text-[10px] font-bold text-white">${item.quantity}</span>
                            <button onclick="changeQty('${item.name}', 1)" class="w-6 h-6 border border-white/10 flex items-center justify-center text-xs hover:border-gold hover:text-gold">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.changeQty = (name, delta) => {
            const item = cart.find(i => i.name === name);
            if(item) {
                item.quantity += delta;
                if(item.quantity <= 0) cart = cart.filter(i => i.name !== name);
                updateCartUI();
            }
        };

        window.removeFromCart = (name) => {
            cart = cart.filter(i => i.name !== name);
            updateCartUI();
        };

        window.enviarWhatsAppPedido = () => {
            if(cart.length === 0) return;
            let msg = "Hola Punto Esencia! Quisiera realizar un pedido de:\n\n";
            let total = 0;
            cart.forEach(i => {
                msg += `• ${i.name} (${i.quantity} u.) - ${formatPrice(i.price * i.quantity)}\n`;
                total += i.price * i.quantity;
            });
            msg += `\n*TOTAL ESTIMADO: ${formatPrice(total)}*`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');

            const hasImg = p.img && p.img.trim() !== "";
            return `
            <div class="group relative bg-[#050505] border border-white/5 p-6 rounded-sm gold-border-hover flex flex-col h-full overflow-hidden">
                <div class="relative overflow-hidden aspect-[4/5] img-container mb-6">
                    <div class="img-fallback">
                        <span class="px-4">${p.name}</span>
                    </div>
                    ${hasImg ? `
                    <img src="${p.img}" 
                         alt="${p.name}" 
                         class="relative z-10 object-cover w-full h-full opacity-0 group-hover:scale-110 transition-all duration-1000"
                         onload="this.classList.add('opacity-100')"
                         onerror="this.style.display='none'">
                    ` : ''}
                    
                    <div class="absolute inset-0 z-20 bg-black/80 opacity-0 group-hover:opacity-100 transition-all duration-500 flex flex-col items-center justify-center gap-3">
                        <button onclick="addToCart('${p.name}', ${p.price}, '${p.img}')" class="bg-gold text-black px-8 py-3 font-bold text-[9px] uppercase tracking-[0.2em] shadow-2xl flex items-center gap-2 transform translate-y-4 group-hover:translate-y-0 transition-all duration-300 border border-gold hover:bg-gold-dark">
                            <i class="ph ph-shopping-cart text-lg"></i> Agregar al Pedido
                        </button>
                        <button onclick="contactWhatsApp('${p.name}')" class="border border-white/40 text-white px-8 py-3 font-bold text-[9px] uppercase tracking-[0.2em] flex items-center gap-2 transform translate-y-4 group-hover:translate-y-0 transition-all duration-500 hover:bg-white hover:text-black">
                            <i class="ph ph-whatsapp-logo text-lg"></i> Consultar
                        </button>
                    </div>
                </div>
                <div class="text-center flex flex-col flex-grow px-2">
                    <h3 class="perfume-title text-white text-[12px] font-semibold mb-3 group-hover:text-gold leading-relaxed">
                        ${p.name}
                    </h3>
                    <div class="w-8 h-px bg-gold/10 mx-auto mb-4 group-hover:bg-gold/40 transition-colors"></div>
                    <p class="text-gold font-sans font-medium mt-auto tracking-[0.2em] text-[10px] uppercase opacity-80">
                        ${formatPrice(p.price)}
                    </p>
                </div>
            </div>
            `;
        };

        const renderCatalog = () => {
            const container = document.getElementById('brands-container');
            container.innerHTML = "";

            Object.keys(allProducts).forEach(brand => {
                const brandId = brand.toLowerCase().replace(/\s+/g, '');
                const section = document.createElement('section');
                section.id = brandId;
                section.className = "brand-section mb-32 text-center";
                
                section.innerHTML = `
                    <h2 class="font-display text-4xl text-white tracking-[0.3em] mb-4 uppercase">${brand}</h2>
                    <div class="w-20 h-px bg-gold mx-auto mb-16"></div>
                    <div class="grid grid-cols-4 gap-10 text-left">
                        ${allProducts[brand].map(createProductHTML).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        };

        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 80) {
                navbar.classList.add('bg-black/95', 'h-16');
                navbar.classList.remove('h-20');
            } else {
                navbar.classList.remove('bg-black/95', 'h-16');
                navbar.classList.add('h-20');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderCatalog();
            updateCartUI();
        });
    </script>
</body>
</html>
